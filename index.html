<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI/ML Phishing Detection</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #dfe3ec;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 42px;
      margin-bottom: 30px;
      color: #000;
    }

    input {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 10px;
      margin-bottom: 25px;
      outline: none;
    }

    .btn-group {
      display: flex;
      gap: 20px;
      margin-bottom: 35px;
    }

    button {
      padding: 16px 28px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #e6e6e6;
      transition: 0.3s;
    }

    button:hover {
      background: #d0d0d0;
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      line-height: 1.8;
      color: #000;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>AI/ML Phishing Detection</h1>

  <input type="text" id="urlInput" placeholder="Enter suspicious URL here">

  <div class="btn-group">
    <button onclick="checkURL()">Check URL</button>
    <button onclick="window.location.href='admin_login.html'">Admin Login</button>
    <button onclick="window.location.href='dashboard.html'">Dashboard</button>
  </div>

  <div id="result" class="result"></div>

</div>

<script>

async function checkURL() {

  const url = document.getElementById("urlInput").value.trim();

  if (!url) {
    document.getElementById("result").innerHTML = "⚠️ Please enter a URL";
    return;
  }

  try {
    const response = await fetch("http://127.0.0.1:5000/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ url })
    });

    const data = await response.json();

    if (!data) {
      document.getElementById("result").innerHTML = "❌ Server error";
      return;
    }

    // ✅ SHOW GEO + RESULT
    document.getElementById("result").innerHTML = `
      <b>Prediction:</b> ${data.prediction}<br>
      <b>Risk Score:</b> ${data.risk_score}%<br>
      <b>URL:</b> ${data.url}<br><br>

      🌍 <b>IP:</b> ${data.ip || "N/A"}<br>
      🌍 <b>Location:</b> ${data.city || "N/A"}, ${data.country || "N/A"}
    `;

    // ✅ SAVE EVERYTHING (INCLUDING GEO)
    saveToDashboard(data);

  } catch (error) {
    console.error(error);
    document.getElementById("result").innerHTML = "❌ Backend connection error";
  }
}


// ✅ UPDATED STORAGE FUNCTION (WITH GEO SUPPORT)
function saveToDashboard(data) {

  let stored = JSON.parse(localStorage.getItem("dashboardData"));

  if (!stored) {
    stored = {
      total_scans: 0,
      phishing_detected: 0,
      safe_urls: 0,
      risk_score: 0,
      history: [],
      alerts: []
    };
  }

  if (!stored.history) stored.history = [];
  if (!stored.alerts) stored.alerts = [];

  stored.total_scans++;

  if (data.prediction.toLowerCase() === "phishing") {
    stored.phishing_detected++;

    stored.alerts.unshift({
      url: data.url,
      risk: data.risk_score,
      ip: data.ip,
      location: `${data.city}, ${data.country}`,
      time: new Date().toLocaleString()
    });

  } else {
    stored.safe_urls++;
  }

  // ✅ SAVE HISTORY WITH GEO
  stored.history.unshift({
    url: data.url,
    prediction: data.prediction,
    risk: data.risk_score,
    ip: data.ip,
    city: data.city,
    country: data.country,
    time: new Date().toLocaleString()
  });

  // latest
  stored.risk_score = data.risk_score;
  stored.url = data.url;
  stored.prediction = data.prediction;
  stored.time = new Date().toLocaleString();

  localStorage.setItem("dashboardData", JSON.stringify(stored));
}

</script>

</body>
</html>
